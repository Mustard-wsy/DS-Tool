<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>__TITLE__</title>
<script src="https://unpkg.com/@antv/g6@5.0.51/dist/g6.min.js"></script>
<style>
  html, body { width:100%; height:100%; margin:0; font-family:Consolas, monospace; }
  #root { display:flex; width:100%; height:100%; }
  #left { width:65%; height:100%; border-right:1px solid #ddd; position:relative; }
  #graph { width:100%; height:100%; }
  #right { width:35%; height:100%; display:flex; flex-direction:column; background:#fafafa; }
  #codeHeader { padding:10px 12px; border-bottom:1px solid #ddd; font-weight:600; background:#fff; }
  #codeView { flex:1; overflow:auto; padding:8px 0; }
  .line { display:flex; padding:2px 12px; white-space:pre; }
  .ln { width:56px; color:#999; user-select:none; }
  .txt { flex:1; }
  .active { background:#fff3cd; }

  #controls { min-height:64px; display:flex; align-items:center; gap:12px; padding:8px 12px; border-top:1px solid #ddd; background:#fff; }
  button { padding:6px 12px; font-size:14px; }
</style>
</head>
<body>
<div id="root">
  <div id="left">
    <div id="graph"></div>
  </div>
  <div id="right">
    <div id="codeHeader">Original Source (full file, auto-scroll to current line)</div>
    <div id="codeView"></div>
    <div id="controls">
      <button id="prevBtn">Prev</button>
      <button id="nextBtn">Next</button>
      <span id="stepInfo"></span>
    </div>
  </div>
</div>

<script>
const STEPS = __STEPS__;
const SOURCE_LINES = __SOURCE_LINES__;
let current = 0;
let graph = null;
let codeRows = [];
let graphResizeObserver = null;
const FIT_PADDING = { top: 44, right: 30, bottom: 44, left: 30 };

function getGraphSize() {
  const el = document.getElementById('graph');
  return {
    width: Math.max(200, el.clientWidth),
    height: Math.max(200, el.clientHeight),
  };
}

function initGraph(data) {
  const { register, BaseNode } = G6;

  class CardNode extends BaseNode {
    drawKeyShape(attributes, container) {
      const name = attributes.name || '';
      const rows = Array.isArray(attributes.rows) ? attributes.rows : [];
      const [w, h] = attributes.size || [160, 80];
      const paddingX = 10;
      const paddingY = 8;
      const rowH = 18;
      const headerH = 22;
      const key = this.upsert('key', 'rect', {
        x: -w/2, y: -h/2, width:w, height:h, radius:4,
        fill:'#e8f0fe', stroke:'#5b8ff9'
      }, container);
      this.upsert('title', 'text', {
        x: -w/2 + paddingX, y: -h/2 + paddingY + 2, text:name,
        fontSize:12, fill:'#111', textBaseline:'top'
      }, container);
      rows.forEach((row, i) => {
        this.upsert(`r-${i}`, 'text', {
          x: -w/2 + paddingX, y: -h/2 + headerH + paddingY + i * rowH + 2, text: row,
          fontSize:11, fill:'#333', textBaseline:'top'
        }, container);
      });
      return key;
    }
  }

  register('node', 'card', CardNode);
  const size = getGraphSize();
  graph = new G6.Graph({
    container:'graph',
    width:size.width,
    height:size.height,
    autoResize:true,
    data,
    layout:{ type:'dagre', rankdir:'LR', nodesep:120, ranksep:220 },
    node:{
      type:'card',
      style: { port: true }
    },
    edge:{
      style:{
        endArrow:true,
        stroke:'#888',
        router: { type: 'polyline' }
      }
    },
    behaviors:['drag-canvas','zoom-canvas','drag-element']
  });

  graph.on('node:dragstart', onDragStart);
  graph.on('node:drag', onDragMove);
  graph.on('node:dragging', onDragMove);
  graph.on('node:dragend', onDragEnd);
  graph.on('element:dragstart', onDragStart);
  graph.on('element:drag', onDragMove);
  graph.on('element:dragend', onDragEnd);

  if (typeof graph.once === 'function') {
    graph.once('afterlayout', refreshGraphVisuals);
    graph.once('afterrender', refreshGraphVisuals);
  }
  graph.render();

  if (typeof ResizeObserver !== 'undefined') {
    graphResizeObserver = new ResizeObserver(() => {
      if (!graph) return;
      const size = getGraphSize();
      if (typeof graph.setSize === 'function') {
        graph.setSize(size.width, size.height);
      }
      refreshGraphVisuals();
    });
    graphResizeObserver.observe(document.getElementById('graph'));
  }
}

function buildPortStyles(node, usedPorts) {
  const ports = Array.isArray(node?.style?.ports) ? node.style.ports : [];
  return ports.map((p) => {
    const key = p.key;
    const active = usedPorts.has(key);
    return {
      ...p,
      r: active ? 2.5 : 0,
      fill: active ? '#5b8ff9' : 'transparent',
      stroke: active ? '#2b6cd4' : 'transparent',
    };
  });
}

function resolvePortsForEdge(e, nodeMap) {
  const src = nodeMap.get(e.source);
  const tgt = nodeMap.get(e.target);
  if (!src || !tgt) return null;
  const refIndex = e.data ? e.data.refIndex : null;
  if (refIndex === null || refIndex === undefined) return null;
  const sx = src.style?.x ?? 0;
  const tx = tgt.style?.x ?? 0;
  const useLeft = tx < sx;
  return {
    sourcePort: useLeft ? `pl${refIndex}` : `pr${refIndex}`,
    targetPort: useLeft ? 'inR' : 'inL',
  };
}

function updateEdgePorts(focusNodeId = null) {
  if (!graph) return;
  const allEdges = graph.getEdgeData();
  const nodeDataList = graph.getNodeData();
  const nodeMap = new Map(nodeDataList.map((n) => [n.id, n]));
  const relatedNodeIds = new Set();

  const edgesToUpdate = focusNodeId
    ? allEdges.filter((e) => e.source === focusNodeId || e.target === focusNodeId)
    : allEdges;

  const edgeUpdates = [];
  for (const e of edgesToUpdate) {
    const ports = resolvePortsForEdge(e, nodeMap);
    if (!ports) continue;
    edgeUpdates.push({ id: e.id, style: ports });
    relatedNodeIds.add(e.source);
    relatedNodeIds.add(e.target);
  }
  if (edgeUpdates.length > 0) {
    graph.updateEdgeData(edgeUpdates);
  }

  const nodeIdsToRefresh = focusNodeId
    ? Array.from(relatedNodeIds)
    : nodeDataList.map((n) => n.id);

  const nodeUpdates = [];
  for (const nodeId of nodeIdsToRefresh) {
    const node = nodeMap.get(nodeId);
    if (!node) continue;
    const usedPorts = new Set();
    for (const e of allEdges) {
      if (e.source !== nodeId && e.target !== nodeId) continue;
      const ports = resolvePortsForEdge(e, nodeMap);
      if (!ports) continue;
      if (e.source === nodeId) usedPorts.add(ports.sourcePort);
      if (e.target === nodeId) usedPorts.add(ports.targetPort);
    }
    nodeUpdates.push({
      id: nodeId,
      style: { ports: buildPortStyles(node, usedPorts) },
    });
  }
  if (nodeUpdates.length > 0) {
    graph.updateNodeData(nodeUpdates);
  }
  if (edgeUpdates.length > 0 || nodeUpdates.length > 0 || !focusNodeId) {
    graph.draw();
  }
}

function fitGraph() {
  requestAnimationFrame(() => {
    if (!graph) return;
    if (typeof graph.fitView === 'function') {
      graph.fitView({
        padding: [FIT_PADDING.top, FIT_PADDING.right, FIT_PADDING.bottom, FIT_PADDING.left],
        when: 'always',
      });
      return;
    }
    if (typeof graph.fitCenter === 'function') {
      graph.fitCenter();
    }
  });
}

function refreshGraphVisuals() {
  updateEdgePorts();
  fitGraph();
}

let rafId = null;
let dragging = false;
let draggingNodeId = null;

function getDragNodeId(evt) {
  return evt?.target?.id || evt?.item?.id || evt?.data?.id || evt?.id || null;
}

function scheduleUpdate(nodeId = null) {
  if (nodeId) draggingNodeId = nodeId;
  if (rafId !== null) return;
  rafId = requestAnimationFrame(() => {
    updateEdgePorts(draggingNodeId);
    rafId = null;
    if (dragging) scheduleUpdate(draggingNodeId);
  });
}

function onDragStart(evt) {
  const nodeId = getDragNodeId(evt);
  if (!nodeId) return;
  dragging = true;
  draggingNodeId = nodeId;
  scheduleUpdate(nodeId);
}

function onDragMove(evt) {
  const nodeId = getDragNodeId(evt) || draggingNodeId;
  if (!nodeId) return;
  scheduleUpdate(nodeId);
}

function onDragEnd(evt) {
  const nodeId = getDragNodeId(evt) || draggingNodeId;
  dragging = false;
  draggingNodeId = null;
  if (!nodeId) return;
  updateEdgePorts(nodeId);
}

function renderAllCode() {
  const codeView = document.getElementById('codeView');
  codeView.innerHTML = '';
  codeRows = [];
  for (let i = 1; i <= SOURCE_LINES.length; i++) {
    const row = document.createElement('div');
    row.className = 'line';
    row.innerHTML = `<span class="ln">${i}</span><span class="txt"></span>`;
    row.querySelector('.txt').textContent = SOURCE_LINES[i - 1] ?? '';
    codeView.appendChild(row);
    codeRows.push(row);
  }
}

function focusLine(lineno) {
  codeRows.forEach((r) => r.classList.remove('active'));
  const line = Math.max(1, Math.min(lineno || 1, codeRows.length));
  const row = codeRows[line - 1];
  if (!row) return;
  row.classList.add('active');
  row.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function renderStep(i) {
  if (!STEPS.length) return;
  current = Math.max(0, Math.min(i, STEPS.length - 1));
  const s = STEPS[current];

  if (!graph) {
    initGraph(s.graph);
  } else {
    graph.setData(s.graph);
    if (typeof graph.once === 'function') {
      graph.once('afterlayout', refreshGraphVisuals);
      graph.once('afterrender', refreshGraphVisuals);
    }
    graph.render();
  }

  focusLine(s.lineno || 1);
  document.getElementById('stepInfo').textContent = `Step ${s.step} / ${STEPS.length}  |  line ${s.lineno ?? '-'}`;
}

document.getElementById('prevBtn').addEventListener('click', () => renderStep(current - 1));
document.getElementById('nextBtn').addEventListener('click', () => renderStep(current + 1));

renderAllCode();
renderStep(0);
</script>
</body>
</html>
