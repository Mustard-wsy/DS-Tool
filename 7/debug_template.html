<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>__TITLE__</title>
<script src="https://unpkg.com/@antv/g6@5.0.51/dist/g6.min.js"></script>
<style>
  html, body { width:100%; height:100%; margin:0; font-family:Consolas, monospace; }
  #root { display:flex; width:100%; height:100%; }
  #left { width:65%; height:100%; border-right:1px solid #ddd; position:relative; }
  #graph { width:100%; height:100%; }
  #right { width:35%; height:100%; display:flex; flex-direction:column; background:#fafafa; }
  #codeHeader { padding:10px 12px; border-bottom:1px solid #ddd; font-weight:600; background:#fff; }
  #codeView { flex:1; overflow:auto; padding:8px 0; }
  .line { display:flex; padding:2px 12px; white-space:pre; }
  .ln { width:56px; color:#999; user-select:none; }
  .txt { flex:1; }
  .active { background:#fff3cd; }
  .tok-comment { color:#6a737d; font-style:italic; }
  .tok-string { color:#0b7a0b; }
  .tok-keyword { color:#8a2be2; font-weight:600; }
  .tok-number { color:#b75501; }
  .tok-function { color:#005cc5; font-weight:600; }
  .tok-class { color:#1f6feb; font-weight:600; }
  .tok-operator { color:#d73a49; }

  #controls { min-height:64px; display:flex; align-items:center; gap:12px; padding:8px 12px; border-top:1px solid #ddd; background:#fff; }
  button { padding:6px 12px; font-size:14px; }
  #stepInput { width:72px; padding:4px 6px; font-size:14px; font-family:Consolas, monospace; }
</style>
</head>
<body>
<div id="root">
  <div id="left">
    <div id="graph"></div>
  </div>
  <div id="right">
    <div id="codeHeader">Original Source (full file, auto-scroll to current line)</div>
    <div id="codeView"></div>
    <div id="controls">
      <button id="prevBtn">Prev</button>
      <button id="nextBtn">Next</button>
      <span>
        Step
        <input id="stepInput" type="number" min="1" step="1" />
        / <span id="stepTotal">0</span>
        &nbsp;|&nbsp; line <span id="lineInfo">-</span>
      </span>
    </div>
  </div>
</div>

<script>
const STEPS = __STEPS__;
const SOURCE_LINES = __SOURCE_LINES__;
const STEP_DIFFS = [];
let current = 0;
let graph = null;
let codeRows = [];
let graphResizeObserver = null;
const LAYOUT_PRESET = {
  minNodeWidth: 120,
  minNodeHeight: 60,
  minGapX: 28,
  minGapY: 22,
  gapRatioX: 0.24,
  gapRatioY: 0.22,
  dagreExtraX: 24,
  dagreExtraY: 18,
  gridPadding: 14,
  treeConnectivityThreshold: 0.55,
  aspectMin: 0.6,
  aspectMax: 1.8,
};
const FIT_PADDING = { top: 44, right: 30, bottom: 44, left: 30 };
const DELTA_COLORS = {
  unchanged: { fill: '#e8f0fe', stroke: '#5b8ff9', line: '#333' },
  changed: { fill: '#fff5e6', stroke: '#ff9800', line: '#c97200' },
  added: { fill: '#eafaf0', stroke: '#34a853', line: '#1e8e3e' },
};

function analyzeLayoutMetrics(graphData, viewport) {
  const nodes = Array.isArray(graphData?.nodes) ? graphData.nodes : [];
  const edges = Array.isArray(graphData?.edges) ? graphData.edges : [];
  let maxH = 80;
  let maxW = 160;
  let sumH = 0;
  let sumW = 0;
  for (const n of nodes) {
    const size = n?.style?.size;
    if (Array.isArray(size) && size.length >= 2) {
      const width = Number(size[0]) || 0;
      const height = Number(size[1]) || 0;
      maxW = Math.max(maxW, width);
      maxH = Math.max(maxH, height);
      sumW += width;
      sumH += height;
    }
  }

  const avgW = Math.max(LAYOUT_PRESET.minNodeWidth, Math.ceil(sumW / Math.max(nodes.length, 1)));
  const avgH = Math.max(LAYOUT_PRESET.minNodeHeight, Math.ceil(sumH / Math.max(nodes.length, 1)));
  const boundaryGapX = Math.max(LAYOUT_PRESET.minGapX, Math.ceil(avgW * LAYOUT_PRESET.gapRatioX));
  const boundaryGapY = Math.max(LAYOUT_PRESET.minGapY, Math.ceil(avgH * LAYOUT_PRESET.gapRatioY));
  const width = viewport?.width || window.innerWidth || 1200;
  const height = viewport?.height || window.innerHeight || 800;
  const aspect = Math.max(
    LAYOUT_PRESET.aspectMin,
    Math.min(LAYOUT_PRESET.aspectMax, width / Math.max(height, 1))
  );
  const cols = Math.max(1, Math.ceil(Math.sqrt(nodes.length * aspect)));
  const connectedNodeIds = new Set();
  for (const e of edges) {
    if (e?.source !== undefined) connectedNodeIds.add(String(e.source));
    if (e?.target !== undefined) connectedNodeIds.add(String(e.target));
  }
  const connectedRatio = connectedNodeIds.size / Math.max(nodes.length, 1);
  const treeLike = edges.length > 0 && (
    connectedRatio >= LAYOUT_PRESET.treeConnectivityThreshold ||
    edges.length >= nodes.length - 1
  );

  return { nodes, maxW, maxH, cols, boundaryGapX, boundaryGapY, treeLike };
}

function computeAdaptiveLayout(graphData, viewport = null) {
  const metrics = analyzeLayoutMetrics(graphData, viewport);
  if (!metrics.nodes.length) {
    return {
      type: 'dagre',
      rankdir: 'LR',
      nodesep: 80,
      ranksep: 110,
    };
  }

  if (metrics.treeLike) {
    return {
      type: 'dagre',
      rankdir: 'LR',
      nodesep: Math.max(metrics.boundaryGapY + LAYOUT_PRESET.dagreExtraY, 44),
      ranksep: Math.max(metrics.boundaryGapX + LAYOUT_PRESET.dagreExtraX, 68),
    };
  }

  return {
    type: 'grid',
    cols: metrics.cols,
    preventOverlap: true,
    nodeSize: [metrics.maxW, metrics.maxH],
    preventOverlapPadding: Math.max(metrics.boundaryGapX, metrics.boundaryGapY),
    sortBy: 'id',
    padding: [LAYOUT_PRESET.gridPadding, LAYOUT_PRESET.gridPadding, LAYOUT_PRESET.gridPadding, LAYOUT_PRESET.gridPadding],
  };
}

function getGraphSize() {
  const el = document.getElementById('graph');
  return {
    width: Math.max(200, el.clientWidth),
    height: Math.max(200, el.clientHeight),
  };
}

function initGraph(data) {
  const { register, BaseNode } = G6;

  class CardNode extends BaseNode {
    drawKeyShape(attributes, container) {
      const name = attributes.name || '';
      const rows = Array.isArray(attributes.rows) ? attributes.rows : [];
      const [w, h] = attributes.size || [160, 80];
      const paddingX = 10;
      const paddingY = 8;
      const rowH = 18;
      const headerH = attributes.headerHeight || 22;
      const headerLines = String(name).split('\n');
      const key = this.upsert('key', 'rect', {
        x: -w/2, y: -h/2, width:w, height:h, radius:4,
        fill: attributes.fill || DELTA_COLORS.unchanged.fill,
        stroke: attributes.stroke || DELTA_COLORS.unchanged.stroke,
        lineWidth: attributes.lineWidth || 1
      }, container);
      const prevHeaderLineCount = this.__prevHeaderLineCount || 0;
      headerLines.forEach((line, i) => {
        this.upsert(`title-${i}`, 'text', {
          x: -w/2 + paddingX, y: -h/2 + paddingY + 2 + i * 14, text:line,
          fontSize:12, fill:'#111', textBaseline:'top'
        }, container);
      });
      for (let i = headerLines.length; i < prevHeaderLineCount; i++) {
        this.upsert(`title-${i}`, 'text', {
          x: -w/2 + paddingX, y: -h/2 + paddingY + 2 + i * 14, text:'',
          fontSize:12, fill:'#111', textBaseline:'top'
        }, container);
      }
      this.__prevHeaderLineCount = headerLines.length;
      rows.forEach((row, i) => {
        const rowDeltaType = Array.isArray(attributes.rowDeltaTypes) ? attributes.rowDeltaTypes[i] : null;
        const rowColor = rowDeltaType === 'added'
          ? DELTA_COLORS.added.line
          : rowDeltaType === 'changed'
            ? DELTA_COLORS.changed.line
            : '#333';
        this.upsert(`r-${i}`, 'text', {
          x: -w/2 + paddingX, y: -h/2 + headerH + paddingY + i * rowH + 2, text: row,
          fontSize:11, fill: rowColor, fontWeight: rowDeltaType ? 600 : 400, textBaseline:'top'
        }, container);
      });
      const prevRowCount = this.__prevRowCount || 0;
      for (let i = rows.length; i < prevRowCount; i++) {
        this.upsert(`r-${i}`, 'text', {
          x: -w/2 + paddingX, y: -h/2 + headerH + paddingY + i * rowH + 2, text: '',
          fontSize:11, fill:'#333', textBaseline:'top'
        }, container);
      }
      this.__prevRowCount = rows.length;
      return key;
    }
  }

  register('node', 'card', CardNode);
  const size = getGraphSize();
  graph = new G6.Graph({
    container:'graph',
    width:size.width,
    height:size.height,
    autoResize:true,
    data,
    layout: computeAdaptiveLayout(data, size),
    node:{
      type:'card',
      style: { port: true }
    },
    edge:{
      style:{
        endArrow:true,
        stroke:'#888',
        router: { type: 'polyline' }
      }
    },
    behaviors:['drag-canvas','zoom-canvas','drag-element']
  });

  graph.on('node:dragstart', onDragStart);
  graph.on('node:drag', onDragMove);
  graph.on('node:dragging', onDragMove);
  graph.on('node:dragend', onDragEnd);
  graph.on('element:dragstart', onDragStart);
  graph.on('element:drag', onDragMove);
  graph.on('element:dragend', onDragEnd);

  if (typeof graph.once === 'function') {
    graph.once('afterlayout', refreshGraphVisuals);
    graph.once('afterrender', refreshGraphVisuals);
  }
  graph.render();

  if (typeof ResizeObserver !== 'undefined') {
    graphResizeObserver = new ResizeObserver(() => {
      if (!graph) return;
      const size = getGraphSize();
      if (typeof graph.setSize === 'function') {
        graph.setSize(size.width, size.height);
      }
      refreshGraphVisuals();
    });
    graphResizeObserver.observe(document.getElementById('graph'));
  }
}

function buildPortStyles(node, usedPorts) {
  const ports = Array.isArray(node?.style?.ports) ? node.style.ports : [];
  return ports.map((p) => {
    const key = p.key;
    const active = usedPorts.has(key);
    return {
      ...p,
      r: active ? 2.5 : 0,
      fill: active ? '#5b8ff9' : 'transparent',
      stroke: active ? '#2b6cd4' : 'transparent',
    };
  });
}

function resolvePortsForEdge(e, nodeMap) {
  const src = nodeMap.get(e.source);
  const tgt = nodeMap.get(e.target);
  if (!src || !tgt) return null;
  const refIndex = e.data ? e.data.refIndex : null;
  if (refIndex === null || refIndex === undefined) return null;
  const sx = src.style?.x ?? 0;
  const tx = tgt.style?.x ?? 0;
  const useLeft = tx < sx;
  return {
    sourcePort: useLeft ? `pl${refIndex}` : `pr${refIndex}`,
    targetPort: useLeft ? 'inR' : 'inL',
  };
}

function updateEdgePorts(focusNodeId = null) {
  if (!graph) return;
  const allEdges = graph.getEdgeData();
  const nodeDataList = graph.getNodeData();
  const nodeMap = new Map(nodeDataList.map((n) => [n.id, n]));
  const relatedNodeIds = new Set();

  const edgesToUpdate = focusNodeId
    ? allEdges.filter((e) => e.source === focusNodeId || e.target === focusNodeId)
    : allEdges;

  const edgeUpdates = [];
  for (const e of edgesToUpdate) {
    const ports = resolvePortsForEdge(e, nodeMap);
    if (!ports) continue;
    edgeUpdates.push({ id: e.id, style: ports });
    relatedNodeIds.add(e.source);
    relatedNodeIds.add(e.target);
  }
  if (edgeUpdates.length > 0) {
    graph.updateEdgeData(edgeUpdates);
  }

  const nodeIdsToRefresh = focusNodeId
    ? Array.from(relatedNodeIds)
    : nodeDataList.map((n) => n.id);

  const nodeUpdates = [];
  for (const nodeId of nodeIdsToRefresh) {
    const node = nodeMap.get(nodeId);
    if (!node) continue;
    const usedPorts = new Set();
    for (const e of allEdges) {
      if (e.source !== nodeId && e.target !== nodeId) continue;
      const ports = resolvePortsForEdge(e, nodeMap);
      if (!ports) continue;
      if (e.source === nodeId) usedPorts.add(ports.sourcePort);
      if (e.target === nodeId) usedPorts.add(ports.targetPort);
    }
    nodeUpdates.push({
      id: nodeId,
      style: { ports: buildPortStyles(node, usedPorts) },
    });
  }
  if (nodeUpdates.length > 0) {
    graph.updateNodeData(nodeUpdates);
  }
  if (edgeUpdates.length > 0 || nodeUpdates.length > 0 || !focusNodeId) {
    graph.draw();
  }
}

function fitGraph() {
  requestAnimationFrame(() => {
    if (!graph) return;
    if (typeof graph.fitView === 'function') {
      graph.fitView({
        padding: [FIT_PADDING.top, FIT_PADDING.right, FIT_PADDING.bottom, FIT_PADDING.left],
        when: 'always',
      });
      return;
    }
    if (typeof graph.fitCenter === 'function') {
      graph.fitCenter();
    }
  });
}

function refreshGraphVisuals() {
  updateEdgePorts();
  fitGraph();
}

let rafId = null;
let dragging = false;
let draggingNodeId = null;

function getDragNodeId(evt) {
  return evt?.target?.id || evt?.item?.id || evt?.data?.id || evt?.id || null;
}

function scheduleUpdate(nodeId = null) {
  if (nodeId) draggingNodeId = nodeId;
  if (rafId !== null) return;
  rafId = requestAnimationFrame(() => {
    updateEdgePorts(draggingNodeId);
    rafId = null;
    if (dragging) scheduleUpdate(draggingNodeId);
  });
}

function onDragStart(evt) {
  const nodeId = getDragNodeId(evt);
  if (!nodeId) return;
  dragging = true;
  draggingNodeId = nodeId;
  scheduleUpdate(nodeId);
}

function onDragMove(evt) {
  const nodeId = getDragNodeId(evt) || draggingNodeId;
  if (!nodeId) return;
  scheduleUpdate(nodeId);
}

function onDragEnd(evt) {
  const nodeId = getDragNodeId(evt) || draggingNodeId;
  dragging = false;
  draggingNodeId = null;
  if (!nodeId) return;
  updateEdgePorts(nodeId);
}

function escapeHtml(raw) {
  return String(raw ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function highlightPythonLine(sourceLine) {
  const text = String(sourceLine ?? '');
  if (!text) return '';
  const regex = /(#[^\n]*|"""[\s\S]*?"""|'''[\s\S]*?'''|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|\b(?:and|as|assert|async|await|break|class|continue|def|del|elif|else|except|False|finally|for|from|global|if|import|in|is|lambda|None|nonlocal|not|or|pass|raise|return|True|try|while|with|yield)\b|\b\d+(?:\.\d+)?\b|\bdef\s+([A-Za-z_]\w*)|\bclass\s+([A-Za-z_]\w*)|[+\-*/%=<>!]+)/g;
  let last = 0;
  let html = '';
  for (const match of text.matchAll(regex)) {
    const token = match[0];
    const index = match.index ?? 0;
    if (index > last) {
      html += escapeHtml(text.slice(last, index));
    }
    let cls = '';
    if (token.startsWith('#')) cls = 'tok-comment';
    else if (token.startsWith('"') || token.startsWith("'")) cls = 'tok-string';
    else if (/^\b\d/.test(token) || /^\d/.test(token)) cls = 'tok-number';
    else if (/^(def\s+)/.test(token)) cls = 'tok-keyword';
    else if (/^(class\s+)/.test(token)) cls = 'tok-keyword';
    else if (/^[+\-*/%=<>!]+$/.test(token)) cls = 'tok-operator';
    else cls = 'tok-keyword';
    html += `<span class="${cls}">${escapeHtml(token)}</span>`;
    last = index + token.length;
  }
  if (last < text.length) {
    html += escapeHtml(text.slice(last));
  }
  return html;
}

function cloneGraphData(data) {
  return JSON.parse(JSON.stringify(data || { nodes: [], edges: [] }));
}

function edgeSignature(edge) {
  return `${edge.source}->${edge.target}#${edge?.data?.refIndex ?? 'na'}`;
}

function computeStepDiffs() {
  STEP_DIFFS.length = 0;
  let prevGraph = null;
  for (let stepIdx = 0; stepIdx < STEPS.length; stepIdx++) {
    const currentGraph = STEPS[stepIdx]?.graph || { nodes: [], edges: [] };
    const diff = {
      nodeTypes: new Map(),
      nodeRowTypes: new Map(),
      addedEdgeSigs: new Set(),
    };
    if (prevGraph) {
      const prevNodeMap = new Map((prevGraph.nodes || []).map((n) => [n.id, n]));
      for (const node of currentGraph.nodes || []) {
        const prevNode = prevNodeMap.get(node.id);
        const rows = Array.isArray(node?.style?.rows) ? node.style.rows : [];
        if (!prevNode) {
          diff.nodeTypes.set(node.id, 'added');
          diff.nodeRowTypes.set(node.id, rows.map(() => 'added'));
          continue;
        }
        const prevRows = Array.isArray(prevNode?.style?.rows) ? prevNode.style.rows : [];
        const rowTypes = [];
        let hasChange = false;
        const maxLen = Math.max(rows.length, prevRows.length);
        for (let i = 0; i < maxLen; i++) {
          if (i >= prevRows.length) {
            rowTypes[i] = 'added';
            hasChange = true;
          } else if (rows[i] !== prevRows[i]) {
            rowTypes[i] = 'changed';
            hasChange = true;
          } else {
            rowTypes[i] = '';
          }
        }
        if ((node?.style?.name || '') !== (prevNode?.style?.name || '')) {
          hasChange = true;
        }
        if (hasChange) {
          diff.nodeTypes.set(node.id, 'changed');
          diff.nodeRowTypes.set(node.id, rowTypes);
        }
      }

      const prevEdges = new Set((prevGraph.edges || []).map(edgeSignature));
      for (const edge of currentGraph.edges || []) {
        const sig = edgeSignature(edge);
        if (!prevEdges.has(sig)) diff.addedEdgeSigs.add(sig);
      }
    }
    STEP_DIFFS.push(diff);
    prevGraph = currentGraph;
  }
}

function applyStepHighlights(graphData, stepIndex) {
  const diff = STEP_DIFFS[stepIndex];
  if (!diff) return graphData;
  for (const node of graphData.nodes || []) {
    const nodeType = diff.nodeTypes.get(node.id) || '';
    const color = nodeType === 'added'
      ? DELTA_COLORS.added
      : nodeType === 'changed'
        ? DELTA_COLORS.changed
        : DELTA_COLORS.unchanged;
    node.style = node.style || {};
    node.style.fill = color.fill;
    node.style.stroke = color.stroke;
    node.style.lineWidth = nodeType ? 2 : 1;
    node.style.rowDeltaTypes = diff.nodeRowTypes.get(node.id) || [];
  }
  for (const edge of graphData.edges || []) {
    const added = diff.addedEdgeSigs.has(edgeSignature(edge));
    edge.style = edge.style || {};
    edge.style.stroke = added ? DELTA_COLORS.added.stroke : '#888';
    edge.style.lineWidth = added ? 2 : 1;
    edge.style.endArrow = {
      ...(typeof edge.style.endArrow === 'object' ? edge.style.endArrow : {}),
      fill: added ? DELTA_COLORS.added.stroke : '#888',
    };
  }
  return graphData;
}

function renderAllCode() {
  const codeView = document.getElementById('codeView');
  codeView.innerHTML = '';
  codeRows = [];
  for (let i = 1; i <= SOURCE_LINES.length; i++) {
    const row = document.createElement('div');
    row.className = 'line';
    row.innerHTML = `<span class="ln">${i}</span><span class="txt"></span>`;
    row.querySelector('.txt').innerHTML = highlightPythonLine(SOURCE_LINES[i - 1] ?? '');
    codeView.appendChild(row);
    codeRows.push(row);
  }
}

function focusLine(lineno) {
  codeRows.forEach((r) => r.classList.remove('active'));
  const line = Math.max(1, Math.min(lineno || 1, codeRows.length));
  const row = codeRows[line - 1];
  if (!row) return;
  row.classList.add('active');
  row.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function renderStep(i) {
  if (!STEPS.length) return;
  current = Math.max(0, Math.min(i, STEPS.length - 1));
  const s = STEPS[current];
  const graphData = applyStepHighlights(cloneGraphData(s.graph), current);

  if (!graph) {
    initGraph(graphData);
  } else {
    const nextLayout = computeAdaptiveLayout(graphData, getGraphSize());
    if (typeof graph.setOptions === 'function') {
      graph.setOptions({ layout: nextLayout });
    } else if (typeof graph.setLayout === 'function') {
      graph.setLayout(nextLayout);
    }
    graph.setData(graphData);
    if (typeof graph.once === 'function') {
      graph.once('afterlayout', refreshGraphVisuals);
      graph.once('afterrender', refreshGraphVisuals);
    }
    graph.render();
  }

  focusLine(s.lineno || 1);
  document.getElementById('stepInput').value = String(current + 1);
  document.getElementById('stepTotal').textContent = String(STEPS.length);
  document.getElementById('lineInfo').textContent = String(s.lineno ?? '-');
}

document.getElementById('prevBtn').addEventListener('click', () => renderStep(current - 1));
document.getElementById('nextBtn').addEventListener('click', () => renderStep(current + 1));
const stepInput = document.getElementById('stepInput');
stepInput.addEventListener('change', () => {
  const raw = Number(stepInput.value);
  if (!Number.isFinite(raw)) return;
  renderStep(raw - 1);
});
stepInput.addEventListener('keydown', (evt) => {
  if (evt.key !== 'Enter') return;
  const raw = Number(stepInput.value);
  if (!Number.isFinite(raw)) return;
  renderStep(raw - 1);
});

renderAllCode();
computeStepDiffs();
renderStep(0);
</script>
</body>
</html>
