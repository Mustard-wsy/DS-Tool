<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>__TITLE__</title>
<style>
  html, body, #container {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  #fallback {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 8px 10px;
    background: #fff3cd;
    border: 1px solid #ffeeba;
    color: #856404;
    font-family: Consolas, monospace;
    font-size: 12px;
    display: none;
    z-index: 10;
  }
</style>
<script src="https://unpkg.com/@antv/g6@5.0.51/dist/g6.min.js"></script>
</head>

<body style="margin:0">
<div id="fallback">G6 加载失败或渲染出错（请检查控制台错误）。</div>
<div id="container"></div>

<script>
const data = __DATA__;
const fallback = document.getElementById('fallback');
const baseLayout = __LAYOUT__;

function computeAdaptiveLayout(graphData, fallbackLayout) {
  const nodes = Array.isArray(graphData?.nodes) ? graphData.nodes : [];
  let maxH = 80;
  let maxW = 160;
  for (const n of nodes) {
    const size = n?.style?.size;
    if (Array.isArray(size) && size.length >= 2) {
      maxW = Math.max(maxW, Number(size[0]) || 0);
      maxH = Math.max(maxH, Number(size[1]) || 0);
    }
  }

  const adaptiveNodeSep = Math.max(120, Math.ceil(maxH + 10));
  const adaptiveRankSep = Math.max(220, Math.ceil(maxW + 10));

  return {
    ...(fallbackLayout || {}),
    type: (fallbackLayout && fallbackLayout.type) || 'dagre',
    rankdir: (fallbackLayout && fallbackLayout.rankdir) || 'LR',
    nodesep: adaptiveNodeSep,
    ranksep: adaptiveRankSep,
  };
}

function showFallback(err) {
  fallback.style.display = 'block';
  if (err && err.message) {
    fallback.textContent = 'G6 渲染错误: ' + err.message;
  }
}

try {
  if (!window.G6) {
    showFallback(new Error('G6 未加载'));
  } else {
    const { register, BaseNode } = G6;

    class CardNode extends BaseNode {
      drawKeyShape(attributes, container) {
        const name = attributes.name || '';
        const rows = Array.isArray(attributes.rows) ? attributes.rows : [];
        const size = attributes.size || [300, 80];
        const width = size[0];
        const height = size[1];

        const paddingX = 10;
        const paddingY = 8;
        const rowH = 18;
        const headerH = attributes.headerHeight || 22;
        const sectionGap = attributes.sectionGap || 6;
        const headerLines = String(name).split('\n');

        const keyShape = this.upsert('key', 'rect', {
          x: -width / 2,
          y: -height / 2,
          width,
          height,
          radius: 4,
          fill: '#e8f0fe',
          stroke: '#5b8ff9',
        }, container);

        this.upsert('header-bg', 'rect', {
          x: -width / 2,
          y: -height / 2,
          width,
          height: headerH + paddingY,
          fill: '#dbe7ff',
          stroke: 'transparent',
          radius: 4,
        }, container);

        const prevHeaderLineCount = this.__prevHeaderLineCount || 0;
        for (let i = 0; i < headerLines.length; i++) {
          this.upsert(`header-text-${i}`, 'text', {
            x: -width / 2 + paddingX,
            y: -height / 2 + paddingY + 2 + i * 14,
            text: headerLines[i],
            fill: '#000',
            fontSize: 12,
            fontFamily: 'Consolas, monospace',
            textBaseline: 'top',
          }, container);
        }
        for (let i = headerLines.length; i < prevHeaderLineCount; i++) {
          this.upsert(`header-text-${i}`, 'text', {
            x: -width / 2 + paddingX,
            y: -height / 2 + paddingY + 2 + i * 14,
            text: '',
            fill: '#000',
            fontSize: 12,
            fontFamily: 'Consolas, monospace',
            textBaseline: 'top',
          }, container);
        }
        this.__prevHeaderLineCount = headerLines.length;

        const rowCount = Math.max(rows.length, 1);

        for (let i = 0; i < rowCount; i++) {
          const y = -height / 2 + headerH + paddingY + i * rowH + 2;
          const text = rows[i] || '';
          if (text) {
            this.upsert(`field-${i}`, 'text', {
              x: -width / 2 + paddingX,
              y,
              text,
              fill: '#1a1a1a',
              fontSize: 11,
              fontFamily: 'Consolas, monospace',
              textBaseline: 'top',
            }, container);
          }
        }

        return keyShape;
      }
    }

    register('node', 'card', CardNode);

    const graph = new G6.Graph({
      container: 'container',
      width: window.innerWidth,
      height: window.innerHeight,
      autoResize: true,
      data,

      layout: computeAdaptiveLayout(data, baseLayout),

      node: {
        type: 'card',
        style: {
          fill: '#e8f0fe',
          stroke: '#5b8ff9',
          radius: 4,
          label: false,
          port: true
        }
      },

      edge: {
        style: {
          stroke: '#999',
          endArrow: true,
          router: {
            type: 'polyline'
          }
        }
      },

      behaviors: ['drag-canvas', 'zoom-canvas', 'drag-element'],
      transforms: ['process-parallel-edges']
    });

    graph.render();

    function buildPortStyles(node, usedPorts) {
      const ports = Array.isArray(node.style?.ports) ? node.style.ports : [];
      return ports.map((p) => {
        const key = p.key;
        const active = usedPorts.has(key);
        return {
          ...p,
          r: active ? 2.5 : 0,
          fill: active ? '#5b8ff9' : 'transparent',
          stroke: active ? '#2b6cd4' : 'transparent',
        };
      });
    }

    function resolvePortsForEdge(e, nodeMap) {
      const src = nodeMap.get(e.source);
      const tgt = nodeMap.get(e.target);
      if (!src || !tgt) return null;

      const refIndex = e.data ? e.data.refIndex : null;
      if (refIndex === null || refIndex === undefined) return null;

      const sx = src.style?.x ?? 0;
      const tx = tgt.style?.x ?? 0;
      const useLeft = tx < sx;
      return {
        sourcePort: useLeft ? `pl${refIndex}` : `pr${refIndex}`,
        targetPort: useLeft ? 'inR' : 'inL',
      };
    }

    function updateEdgePorts(focusNodeId = null) {
        const allEdges = graph.getEdgeData();
        const nodeDataList = graph.getNodeData();
        const nodeMap = new Map(nodeDataList.map((n) => [n.id, n]));
        const relatedNodeIds = new Set();

        const edgesToUpdate = focusNodeId
          ? allEdges.filter((e) => e.source === focusNodeId || e.target === focusNodeId)
          : allEdges;

        const edgeUpdates = [];
        for (const e of edgesToUpdate) {
          const ports = resolvePortsForEdge(e, nodeMap);
          if (!ports) continue;
          edgeUpdates.push({
            id: e.id,
            style: ports,
          });
          relatedNodeIds.add(e.source);
          relatedNodeIds.add(e.target);
        }

        if (edgeUpdates.length > 0) {
          graph.updateEdgeData(edgeUpdates);
        }

        const nodeIdsToRefresh = focusNodeId
          ? Array.from(relatedNodeIds)
          : nodeDataList.map((n) => n.id);

        const nodeUpdates = [];
        for (const nodeId of nodeIdsToRefresh) {
          const node = nodeMap.get(nodeId);
          if (!node) continue;

          const usedPorts = new Set();
          for (const e of allEdges) {
            if (e.source !== nodeId && e.target !== nodeId) continue;
            const ports = resolvePortsForEdge(e, nodeMap);
            if (!ports) continue;
            if (e.source === nodeId) usedPorts.add(ports.sourcePort);
            if (e.target === nodeId) usedPorts.add(ports.targetPort);
          }

          nodeUpdates.push({
            id: nodeId,
            style: {
              ports: buildPortStyles(node, usedPorts),
            },
          });
        }

        if (nodeUpdates.length > 0) {
          graph.updateNodeData(nodeUpdates);
        }
        if (edgeUpdates.length > 0 || nodeUpdates.length > 0 || !focusNodeId) {
          graph.draw();
        }
    }

    let rafId = null;
    let dragging = false;
    let draggingNodeId = null;

    function getDragNodeId(evt) {
      return evt?.target?.id || evt?.item?.id || evt?.data?.id || evt?.id || null;
    }

    function scheduleUpdate(nodeId = null) {
      if (nodeId) draggingNodeId = nodeId;
      if (rafId !== null) return;
      rafId = requestAnimationFrame(() => {
        updateEdgePorts(draggingNodeId);
        rafId = null;
        if (dragging) scheduleUpdate(draggingNodeId);
      });
    }

    function onDragStart(evt) {
      const nodeId = getDragNodeId(evt);
      if (!nodeId) return;
      dragging = true;
      draggingNodeId = nodeId;
      scheduleUpdate(nodeId);
    }

    function onDragMove(evt) {
      const nodeId = getDragNodeId(evt) || draggingNodeId;
      if (!nodeId) return;
      scheduleUpdate(nodeId);
    }

    function onDragEnd(evt) {
      const nodeId = getDragNodeId(evt) || draggingNodeId;
      dragging = false;
      draggingNodeId = null;
      if (!nodeId) return;
      updateEdgePorts(nodeId);
    }

    function computeContentBounds() {
      const nodes = graph.getNodeData();
      if (!Array.isArray(nodes) || nodes.length === 0) return null;

      let minX = Infinity;
      let maxX = -Infinity;
      let minY = Infinity;
      let maxY = -Infinity;
      let hasPosition = false;

      for (const node of nodes) {
        const x = Number(node?.style?.x);
        const y = Number(node?.style?.y);
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
        hasPosition = true;

        const size = Array.isArray(node?.style?.size) ? node.style.size : [100, 60];
        const width = Number(size[0]) || 100;
        const height = Number(size[1]) || 60;
        const halfW = width / 2;
        const halfH = height / 2;

        minX = Math.min(minX, x - halfW);
        maxX = Math.max(maxX, x + halfW);
        minY = Math.min(minY, y - halfH);
        maxY = Math.max(maxY, y + halfH);
      }

      if (!hasPosition) return null;
      return {
        minX,
        maxX,
        minY,
        maxY,
        width: Math.max(maxX - minX, 1),
        height: Math.max(maxY - minY, 1),
      };
    }

    function getSafeViewportPadding() {
      const container = document.getElementById('container');
      const rect = container?.getBoundingClientRect();
      if (!rect || rect.width <= 0 || rect.height <= 0) {
        return { top: 48, right: 48, bottom: 48, left: 48 };
      }

      const base = { top: 28, right: 28, bottom: 28, left: 28 };
      const computed = getComputedStyle(document.documentElement);
      const cssPadding = {
        top: Number.parseFloat(computed.getPropertyValue('--dsvis-safe-top')) || 0,
        right: Number.parseFloat(computed.getPropertyValue('--dsvis-safe-right')) || 0,
        bottom: Number.parseFloat(computed.getPropertyValue('--dsvis-safe-bottom')) || 0,
        left: Number.parseFloat(computed.getPropertyValue('--dsvis-safe-left')) || 0,
      };

      const overlay = { top: 0, right: 0, bottom: 0, left: 0 };
      const children = Array.from(document.body.children);
      for (const el of children) {
        if (el === container || el.id === 'fallback') continue;
        const style = window.getComputedStyle(el);
        if (style.display === 'none' || style.visibility === 'hidden') continue;
        const position = style.position;
        if (!['fixed', 'absolute', 'sticky'].includes(position)) continue;

        const r = el.getBoundingClientRect();
        if (r.width <= 0 || r.height <= 0) continue;
        const overlapW = Math.max(0, Math.min(rect.right, r.right) - Math.max(rect.left, r.left));
        const overlapH = Math.max(0, Math.min(rect.bottom, r.bottom) - Math.max(rect.top, r.top));
        if (overlapW <= 0 || overlapH <= 0) continue;

        const coversMostlyVertical = overlapH >= rect.height * 0.6;
        const coversMostlyHorizontal = overlapW >= rect.width * 0.6;
        if (coversMostlyVertical && r.left >= rect.left + rect.width * 0.45) {
          overlay.right = Math.max(overlay.right, overlapW);
        }
        if (coversMostlyVertical && r.right <= rect.left + rect.width * 0.55) {
          overlay.left = Math.max(overlay.left, overlapW);
        }
        if (coversMostlyHorizontal && r.top >= rect.top + rect.height * 0.45) {
          overlay.bottom = Math.max(overlay.bottom, overlapH);
        }
        if (coversMostlyHorizontal && r.bottom <= rect.top + rect.height * 0.55) {
          overlay.top = Math.max(overlay.top, overlapH);
        }
      }

      return {
        top: Math.max(base.top, base.top + cssPadding.top + overlay.top),
        right: Math.max(base.right, base.right + cssPadding.right + overlay.right),
        bottom: Math.max(base.bottom, base.bottom + cssPadding.bottom + overlay.bottom),
        left: Math.max(base.left, base.left + cssPadding.left + overlay.left),
      };
    }

    function applyAutoFitViewport() {
      const container = document.getElementById('container');
      const viewportWidth = container?.clientWidth || window.innerWidth;
      const viewportHeight = container?.clientHeight || window.innerHeight;
      const safePadding = getSafeViewportPadding();
      const bounds = computeContentBounds();

      if (!bounds) {
        if (typeof graph.fitView === 'function') {
          graph.fitView({
            padding: [safePadding.top, safePadding.right, safePadding.bottom, safePadding.left],
          });
        } else if (typeof graph.fitCenter === 'function') {
          graph.fitCenter();
        }
        return;
      }

      const availableWidth = Math.max(1, viewportWidth - safePadding.left - safePadding.right);
      const availableHeight = Math.max(1, viewportHeight - safePadding.top - safePadding.bottom);
      const scaleX = availableWidth / bounds.width;
      const scaleY = availableHeight / bounds.height;
      const targetScale = Math.min(scaleX, scaleY, 1);
      const safeScale = Number.isFinite(targetScale) && targetScale > 0 ? targetScale : 1;

      if (typeof graph.fitView === 'function') {
        graph.fitView({
          padding: [safePadding.top, safePadding.right, safePadding.bottom, safePadding.left],
          when: 'always',
        });
      } else {
        if (typeof graph.fitCenter === 'function') {
          graph.fitCenter();
        }
        const focusX = (safePadding.left + (viewportWidth - safePadding.right)) / 2;
        const focusY = (safePadding.top + (viewportHeight - safePadding.bottom)) / 2;
        if (typeof graph.zoomTo === 'function') {
          graph.zoomTo(safeScale, { x: focusX, y: focusY }, false);
        }
      }
    }

    function refreshAfterLoad() {
      updateEdgePorts();
      requestAnimationFrame(() => updateEdgePorts());
      setTimeout(() => updateEdgePorts(), 0);
      requestAnimationFrame(applyAutoFitViewport);
    }

    graph.once('afterlayout', refreshAfterLoad);
    graph.once('afterrender', refreshAfterLoad);
    graph.on('node:dragstart', onDragStart);

    graph.on('node:drag', onDragMove);
    graph.on('node:dragging', onDragMove);
    graph.on('node:dragend', onDragEnd);
    graph.on('element:dragstart', onDragStart);
    graph.on('element:drag', onDragMove);

    graph.on('element:dragend', onDragEnd);
  }
} catch (err) {
  console.error(err);
  showFallback(err);
}
</script>
</body>
</html>
